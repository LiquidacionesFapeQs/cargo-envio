<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLT - Cargos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 lg:p-16 font-sans">

    <div id="loginPage" class="max-w-md mx-auto mt-20 bg-white p-12 rounded-[3rem] shadow-2xl border-t-[12px] border-indigo-600">
        <h2 class="text-4xl font-black text-center mb-10 text-slate-800 tracking-tighter">ACCESO DNI</h2>
        <input type="number" id="dni" placeholder="Tu DNI" class="w-full p-6 border-4 border-slate-50 rounded-3xl mb-8 text-center text-4xl font-black focus:border-indigo-500 outline-none transition-all">
        <button onclick="login()" id="btnLogin" class="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-2xl shadow-2xl hover:bg-indigo-700 active:scale-90 transition-all">ENTRAR</button>
    </div>

    <div id="appPage" class="hidden max-w-2xl mx-auto space-y-8">
        <div class="bg-white p-8 rounded-[2rem] shadow-sm flex justify-between items-center border-l-8 border-indigo-500">
            <div class="truncate">
                <p class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em]">Responsable</p>
                <span id="uName" class="text-3xl font-black text-slate-800 truncate"></span>
            </div>
            <button onclick="location.reload()" class="bg-slate-100 px-6 py-4 rounded-2xl text-slate-400 font-black text-sm uppercase">Salir</button>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl space-y-10">
            <div>
                <label class="block text-xs font-black text-slate-400 mb-4 uppercase tracking-widest">Motivo del Cargo (Aux Col A)</label>
                <select id="motivo" class="w-full p-6 bg-slate-50 rounded-3xl font-black text-3xl text-slate-700 border-4 border-transparent focus:border-indigo-500 outline-none appearance-none cursor-pointer">
                    <option>Cargando...</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-400 mb-4 uppercase tracking-widest">Detalle Adicional (Historial Col E)</label>
                <input type="text" id="detalle" placeholder="Nota opcional..." class="w-full p-6 bg-slate-50 rounded-3xl text-3xl font-bold outline-none focus:ring-8 focus:ring-indigo-500/5">
            </div>

            <button onclick="generar()" id="btnG" class="w-full bg-emerald-500 text-white py-10 rounded-[2rem] font-black text-4xl shadow-2xl shadow-emerald-200 active:scale-95 transition-all">
                GENERAR CARGO
            </button>
        </div>

        <div id="resCard" class="hidden bg-amber-400 p-8 rounded-[2.5rem] shadow-2xl flex justify-between items-center border-4 border-white animate-bounce">
            <div class="truncate">
                <p class="text-[10px] font-black uppercase text-amber-900 mb-2">Listo para Excel (ID + TAB + Fecha):</p>
                <p id="newId" class="text-4xl font-black text-amber-950 tracking-tighter"></p>
            </div>
            <button onclick="copiar()" class="bg-amber-950 text-white px-12 py-6 rounded-3xl font-black text-2xl hover:bg-black transition-all">COPIAR</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzrhC3hJ1_nUCo-u68RiH9s_f3SBDNBj_vlci1DWHvnxWXeNyaReo4gEO44oonIwFqz/exec"; 
        const TOKEN = "Cargos-v0410";
        let userName = "";
        let motivosData = []; 

        async function login() {
            const dni = document.getElementById('dni').value;
            const btn = document.getElementById('btnLogin');
            btn.innerText = "ESPERA...";
            
            try {
                const res = await fetch(API, {method:'POST', body: JSON.stringify({action:'login', dni:dni, token:TOKEN})});
                const data = await res.json();
                if(data.status === 'success') {
                    userName = data.nombre;
                    mostrar();
                } else { alert("DNI NO REGISTRADO"); btn.innerText = "ENTRAR"; }
            } catch(e) { alert("Error de red"); btn.innerText = "ENTRAR"; }
        }

        async function mostrar() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            document.getElementById('uName').innerText = userName;
            
            // Cargar Motivos (Col A) y sus Datos Asociados (Col B)
            const res = await fetch(API, {method:'POST', body: JSON.stringify({action:'getMotivos', token:TOKEN})});
            const data = await res.json();
            motivosData = data.lista;
            
            const select = document.getElementById('motivo');
            select.innerHTML = motivosData.map(m => `<option value="${m.motivo}">${m.motivo}</option>`).join('');
        }

        async function generar() {
            const btn = document.getElementById('btnG');
            const motivoSel = document.getElementById('motivo').value;
            const infoMotivo = motivosData.find(m => m.motivo === motivoSel);
            
            btn.disabled = true; btn.innerText = "REGISTRANDO...";
            
            const payload = {
                action: 'registrar',
                token: TOKEN,
                nombre: userName,
                motivo: motivoSel,
                asociadoMotivo: infoMotivo ? infoMotivo.asociado : "", // Va a Columna G
                detalle: document.getElementById('detalle').value      // Va a Columna E
            };

            const res = await fetch(API, {method:'POST', body: JSON.stringify(payload)});
            const data = await res.json();
            
            if(data.status === 'success') {
                const el = document.getElementById('newId');
                el.innerText = data.id;
                el.dataset.copy = `${data.id}\t${data.fecha}`; // Formato TAB para Excel
                document.getElementById('resCard').classList.remove('hidden');
                document.getElementById('detalle').value = "";
            }
            btn.disabled = false; btn.innerText = "GENERAR CARGO";
        }

        function copiar() {
            const text = document.getElementById('newId').dataset.copy;
            navigator.clipboard.writeText(text);
            alert("¡Copiado! ID y Fecha listos para pegar en Excel.");
        }
    </script>
</body>
</html>
