<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Cargos OLT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #6366f1; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-900">

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-200">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04m14.562 0c.19.647.298 1.328.298 2.032 0 4.474-2.247 8.209-5.511 10.334M12 21.056c-3.264-2.125-5.511-5.86-5.511-10.334 0-.704.108-1.385.298-2.032"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Acceso OLT</h2>
                <p class="text-slate-500 text-sm">Ingresa tu DNI para comenzar</p>
            </div>
            
            <input type="number" id="loginDni" placeholder="Número de DNI" 
                class="w-full p-4 border border-slate-200 rounded-2xl mb-4 text-center text-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
            
            <button onclick="intentarLogin()" id="btnLogin" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 active:scale-95 transition-all">
                ENTRAR
            </button>
            <p id="loginError" class="text-red-500 mt-4 text-sm font-medium hidden">⚠️ DNI no registrado</p>
        </div>
    </div>

    <div id="mainPage" class="hidden max-w-lg mx-auto p-4 pb-20 space-y-6">
        
        <header class="flex justify-between items-center bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mt-2">
            <div>
                <p class="text-[10px] uppercase tracking-widest text-indigo-600 font-bold mb-1">Responsable Activo</p>
                <h1 class="text-lg font-black text-slate-800" id="userNameDisplay">---</h1>
            </div>
            <button onclick="logout()" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Seleccionar Asunto</label>
                <select id="asunto" class="w-full p-4 border border-slate-200 rounded-2xl bg-slate-50 focus:border-indigo-500 outline-none appearance-none font-medium text-slate-700">
                    <option value="TECNOFARMA">TECNOFARMA</option>
                    <option value="LICITACIONES">LICITACIONES</option>
                    <option value="IBT HEALTH">IBT HEALTH</option>
                    <option value="GENOMMA LAB">GENOMMA LAB</option>
                    <option value="CENARES">CENARES</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Comentario / Cuenta</label>
                <input type="text" id="comentario" placeholder="Ej: Entrega Lima Norte" 
                    class="w-full p-4 border border-slate-200 rounded-2xl bg-slate-50 focus:border-indigo-500 outline-none transition-all">
            </div>

            <button onclick="generarCargo()" id="btnGenerar" 
                class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg shadow-emerald-100 active:scale-95 transition-all flex items-center justify-center gap-2">
                <span id="btnText">GENERAR CARGO</span>
                <div id="btnLoader" class="loader ease-linear rounded-full border-2 border-t-2 border-white h-5 w-5 hidden"></div>
            </button>
        </div>

        <div id="resultCard" class="hidden animate-bounce bg-amber-400 p-5 rounded-3xl shadow-xl shadow-amber-100 flex justify-between items-center text-amber-950">
            <div>
                <p class="text-[10px] font-black uppercase opacity-70">Cargo Generado con Éxito</p>
                <p id="newIdLabel" class="text-2xl font-black tracking-tighter"></p>
            </div>
            <button onclick="copiarAlPortapapeles()" class="bg-white/30 hover:bg-white/50 p-3 rounded-2xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
            </button>
        </div>

        <div class="space-y-4">
            <h3 class="font-bold text-slate-800 text-sm px-2 flex items-center gap-2">
                <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Tus últimos registros
            </h3>
            <div id="historialContainer" class="space-y-3">
                </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN - CAMBIA ESTO
        const API_URL = "https://script.google.com/macros/s/AKfycbzw0S4FmzTBB14Ad8U63t4MubP2Ru7q_6el7zvVL4k5db5IuDjCYg_x5Jq10ekkLqye/exec";
        const TOKEN = "OLT-V04.10";

        let sessionUser = localStorage.getItem('olt_user_name');

        // Al iniciar
        if(sessionUser) { mostrarApp(); }

        async function intentarLogin() {
            const dni = document.getElementById('loginDni').value;
            const btn = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('loginError');

            if(!dni) return;

            btn.disabled = true;
            btn.innerText = "Verificando...";
            errorMsg.classList.add('hidden');

            try {
                const res = await callAPI({ action: "login", dni: dni });
                if(res.status === "success") {
                    localStorage.setItem('olt_user_name', res.nombre);
                    sessionUser = res.nombre;
                    mostrarApp();
                } else {
                    errorMsg.classList.remove('hidden');
                    btn.innerText = "ENTRAR";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Error de conexión con el servidor");
                btn.disabled = false;
            }
        }

        function mostrarApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = sessionUser;
            cargarHistorial();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        async function generarCargo() {
            const btn = document.getElementById('btnGenerar');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const asunto = document.getElementById('asunto').value;
            const comentario = document.getElementById('comentario').value;

            btn.disabled = true;
            btnText.innerText = "PROCESANDO";
            btnLoader.classList.remove('hidden');

            try {
                const res = await callAPI({ 
                    action: "registrar", 
                    nombre: sessionUser, 
                    asunto: asunto, 
                    comentario: comentario 
                });

                if(res.status === "success") {
                    const fullInfo = `Cargo: ${res.id} | Fecha: ${res.fecha}`;
                    const label = document.getElementById('newIdLabel');
                    label.innerText = res.id;
                    label.dataset.copyText = fullInfo;
                    
                    document.getElementById('resultCard').classList.remove('hidden');
                    document.getElementById('comentario').value = "";
                    cargarHistorial();
                    
                    // Vibración suave si el dispositivo lo permite
                    if(navigator.vibrate) navigator.vibrate(50);
                }
            } catch (e) {
                alert("Error al registrar cargo");
            } finally {
                btn.disabled = false;
                btnText.innerText = "GENERAR CARGO";
                btnLoader.classList.add('hidden');
            }
        }

        async function cargarHistorial() {
            const container = document.getElementById('historialContainer');
            try {
                const res = await callAPI({ action: "getHistorial", nombre: sessionUser });
                if(res.datos && res.datos.length > 0) {
                    container.innerHTML = res.datos.map(item => `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center group active:bg-slate-50 transition-all">
                            <div>
                                <p class="font-black text-slate-800 tracking-tight">${item.id}</p>
                                <p class="text-[11px] text-slate-400 font-bold uppercase">${item.destino}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-slate-300 font-medium">${new Date(item.fecha).toLocaleDateString('es-PE')}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-center text-slate-400 text-xs py-4">No hay cargos recientes</p>';
                }
            } catch (e) {
                container.innerHTML = '<p class="text-center text-red-400 text-xs py-4">Error al cargar historial</p>';
            }
        }

        function copiarAlPortapapeles() {
            const text = document.getElementById('newIdLabel').dataset.copyText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Copiado: " + text);
            });
        }

        async function callAPI(payload) {
            payload.token = TOKEN;
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            return await response.json();
        }
    </script>
</body>
</html>
