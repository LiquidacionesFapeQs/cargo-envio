<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador OLT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #ffffff; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-black text-slate-800 mb-2 text-center">Acceso DNI</h2>
            <p class="text-slate-400 text-sm text-center mb-6">Identifícate para generar cargos</p>
            <input type="number" id="loginDni" placeholder="DNI" class="w-full p-4 border-2 border-slate-100 rounded-2xl mb-4 text-center text-2xl font-bold outline-none focus:border-indigo-500 transition-all">
            <button onclick="intentarLogin()" id="btnLogin" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">ENTRAR</button>
            <p id="loginError" class="text-red-500 mt-4 text-center font-bold hidden">⚠️ DNI no registrado</p>
        </div>
    </div>

    <div id="mainPage" class="hidden max-w-lg mx-auto p-4 space-y-4">
        <header class="bg-white p-5 rounded-3xl shadow-sm flex justify-between items-center mt-2 border border-slate-200">
            <div class="truncate mr-2">
                <p class="text-[10px] font-black text-indigo-500 uppercase">Responsable</p>
                <h1 id="userNameDisplay" class="text-lg font-bold text-slate-800 truncate">---</h1>
            </div>
            <button onclick="logout()" class="bg-slate-50 p-3 rounded-2xl text-slate-400 hover:text-red-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-sm space-y-4 border border-slate-200">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Asunto / Destinatario</label>
                <select id="asunto" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-slate-700 outline-none mt-1">
                    <option value="TECNOFARMA">TECNOFARMA</option>
                    <option value="LICITACIONES">LICITACIONES</option>
                    <option value="IBT HEALTH">IBT HEALTH</option>
                    <option value="GENOMMA LAB">GENOMMA LAB</option>
                    <option value="CENARES">CENARES</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Comentario</label>
                <input type="text" id="comentario" placeholder="Escribe aquí..." class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none mt-1">
            </div>
            <button onclick="generarCargo()" id="btnGenerar" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-lg shadow-lg shadow-emerald-100 flex items-center justify-center gap-3">
                <span id="btnText">GENERAR CARGO</span>
                <div id="btnLoader" class="loader rounded-full border-2 border-t-2 border-white h-5 w-5 hidden"></div>
            </button>
        </div>

        <div id="resultCard" class="hidden bg-amber-400 p-5 rounded-3xl shadow-xl flex justify-between items-center animate-pulse">
            <div class="truncate">
                <p class="text-[10px] font-black uppercase text-amber-900 opacity-60">Copiado Listo:</p>
                <p id="newIdLabel" class="text-xl font-black text-amber-950 truncate"></p>
            </div>
            <button onclick="copiarInfo()" id="btnCopy" class="bg-amber-900 text-white p-4 rounded-2xl font-bold text-xs uppercase">COPIAR</button>
        </div>

        <div class="space-y-3">
            <h3 class="text-xs font-black text-slate-400 uppercase ml-2 tracking-widest">Historial Reciente</h3>
            <div id="historialContainer" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const API_URL = "https://script.google.com/macros/s/AKfycby8O38P4ZiLrTjoNO9DsXhySN4_RyVlO4ygpvlHyDlrMFxck_PlVA1EkfHDdMKTpF_4/exec"; // <--- PEGAR AQUÍ
        const TOKEN = "OLT-V04.10";   // <--- MISMA CLAVE DEL .GS

        let user = localStorage.getItem('olt_name');

        if(user) mostrarApp();

        async function intentarLogin() {
            const dni = document.getElementById('loginDni').value;
            if(!dni) return;
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.innerText = "Verificando...";

            try {
                const res = await callAPI({ action: "login", dni: dni });
                if(res.status === "success") {
                    localStorage.setItem('olt_name', res.nombre);
                    user = res.nombre;
                    mostrarApp();
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "ENTRAR";
                }
            } catch(e) { alert("Error de conexión"); btn.disabled = false; }
        }

        function mostrarApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = user;
            cargarHistorial();
        }

        function logout() { localStorage.clear(); location.reload(); }

        async function generarCargo() {
            const btn = document.getElementById('btnGenerar');
            const loader = document.getElementById('btnLoader');
            const txt = document.getElementById('btnText');
            
            btn.disabled = true;
            txt.innerText = "REGISTRANDO...";
            loader.classList.remove('hidden');

            try {
                const res = await callAPI({ 
                    action: "registrar", 
                    nombre: user, 
                    asunto: document.getElementById('asunto').value,
                    comentario: document.getElementById('comentario').value
                });

                if(res.status === "success") {
                    // FORMATO SOLICITADO: ID + TAB + FECHA
                    const copyText = `${res.id}\t${res.fecha}`;
                    const label = document.getElementById('newIdLabel');
                    label.innerText = res.id;
                    label.dataset.full = copyText;
                    
                    document.getElementById('resultCard').classList.remove('hidden');
                    document.getElementById('comentario').value = "";
                    cargarHistorial();
                }
            } catch(e) { alert("Error en el registro"); }
            finally {
                btn.disabled = false;
                txt.innerText = "GENERAR CARGO";
                loader.classList.add('hidden');
            }
        }

        async function cargarHistorial() {
            const res = await callAPI({ action: "getHistorial", nombre: user });
            const cont = document.getElementById('historialContainer');
            if(res.datos && res.datos.length > 0) {
                cont.innerHTML = res.datos.map(i => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center">
                        <div><p class="font-black text-slate-800 text-sm">${i.id}</p><p class="text-[10px] font-bold text-slate-400 uppercase">${i.destino}</p></div>
                        <p class="text-[10px] text-slate-300 font-bold">${new Date(i.fecha).toLocaleDateString('es-PE')}</p>
                    </div>
                `).join('');
            }
        }

        function copiarInfo() {
            const btn = document.getElementById('btnCopy');
            const text = document.getElementById('newIdLabel').dataset.full;
            navigator.clipboard.writeText(text).then(() => {
                btn.innerText = "¡LISTO!";
                setTimeout(() => { btn.innerText = "COPIAR"; }, 2000);
            });
        }

        async function callAPI(p) {
            p.token = TOKEN;
            const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) });
            return await r.json();
        }
    </script>
</body>
</html>
