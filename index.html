<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control OLT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loader { border-top-color: #ffffff; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-slate-200">
            <h2 class="text-xl font-bold text-center mb-6">Acceso al Sistema</h2>
            <input type="number" id="dni" placeholder="DNI" class="w-full p-3 border rounded-xl mb-4 text-center text-lg outline-none focus:ring-2 focus:ring-indigo-500">
            <button onclick="login()" id="btnLogin" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all">ENTRAR</button>
        </div>
    </div>

    <div id="appPage" class="hidden h-screen flex flex-col">
        <header class="bg-white border-b px-6 py-3 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <span class="bg-indigo-600 text-white px-3 py-1 rounded-md text-xs font-bold">OLT</span>
                <h1 id="uName" class="font-bold text-slate-700">---</h1>
            </div>
            <button onclick="location.reload()" class="text-slate-400 hover:text-red-500 text-sm font-medium">Cerrar Sesión</button>
        </header>

        <main class="flex flex-1 overflow-hidden">
            <div class="w-1/3 p-6 border-r bg-white overflow-y-auto">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-6">Generar Nuevo Cargo</h3>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold mb-2 text-slate-600">Motivo (Aux A)</label>
                        <select id="motivo" class="w-full p-2.5 bg-slate-50 border rounded-lg text-sm font-medium outline-none focus:border-indigo-500">
                            <option>Cargando...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold mb-2 text-slate-600">Detalle Adicional (Col E)</label>
                        <textarea id="detalle" rows="3" placeholder="Información extra..." class="w-full p-2.5 bg-slate-50 border rounded-lg text-sm outline-none focus:border-indigo-500 resize-none"></textarea>
                    </div>

                    <button onclick="generar()" id="btnG" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-emerald-700 shadow-md active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span>GENERAR CARGO</span>
                        <div id="btnLoader" class="loader rounded-full border-2 border-t-2 border-white h-4 w-4 hidden"></div>
                    </button>

                    <div id="resCard" class="hidden bg-amber-50 border border-amber-200 p-4 rounded-xl space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[10px] font-bold text-amber-600 uppercase">Cargo Generado</p>
                                <p id="newId" class="text-lg font-black text-amber-900"></p>
                            </div>
                            <button onclick="copiar()" class="bg-amber-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-amber-700">COPIAR</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-2/3 bg-slate-50 p-6 overflow-hidden flex flex-col">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-6">Mi Historial Reciente</h3>
                
                <div class="bg-white border rounded-xl flex-1 overflow-hidden flex flex-col">
                    <div class="overflow-x-auto custom-scroll">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 sticky top-0 border-b">
                                <tr>
                                    <th class="p-3 text-[10px] font-bold text-slate-500 uppercase">N° Cargo</th>
                                    <th class="p-3 text-[10px] font-bold text-slate-500 uppercase">Fecha</th>
                                    <th class="p-3 text-[10px] font-bold text-slate-500 uppercase">Motivo</th>
                                    <th class="p-3 text-[10px] font-bold text-slate-500 uppercase">Detalle</th>
                                    <th class="p-3 text-[10px] font-bold text-slate-500 uppercase text-right">Cuenta</th>
                                </tr>
                            </thead>
                            <tbody id="histTable" class="text-xs divide-y">
                                </tbody>
                        </table>
                    </div>
                    <div id="noData" class="hidden p-10 text-center text-slate-400 text-sm">No hay registros hoy.</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwLiusbmJz_zpYOI987X6GxqABYA9MEwljIwTV3O41TOnI2xRZCrMTwN-gNe2SxdZu7/exec"; 
        const TOKEN = "generarcargo-0410";
        let user = { nombre: "" };
        let motivosData = [];

        async function login() {
            const dni = document.getElementById('dni').value;
            if(!dni) return;
            const res = await fetch(API, {method:'POST', body: JSON.stringify({action:'login', dni:dni, token:TOKEN})});
            const data = await res.json();
            if(data.status === 'success') {
                user.nombre = data.nombre;
                mostrarApp();
            } else { alert("DNI no registrado"); }
        }

        async function mostrarApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            document.getElementById('uName').innerText = user.nombre;
            
            // Cargar Motivos
            const res = await fetch(API, {method:'POST', body: JSON.stringify({action:'getMotivos', token:TOKEN})});
            const data = await res.json();
            motivosData = data.lista;
            document.getElementById('motivo').innerHTML = motivosData.map(m => `<option value="${m.motivo}">${m.motivo}</option>`).join('');
            
            cargarHistorial();
        }

        async function generar() {
            const btn = document.getElementById('btnG');
            const loader = document.getElementById('btnLoader');
            const motivoSel = document.getElementById('motivo').value;
            const info = motivosData.find(m => m.motivo === motivoSel);

            btn.disabled = true; loader.classList.remove('hidden');

            const res = await fetch(API, {method:'POST', body: JSON.stringify({
                action: 'registrar',
                token: TOKEN,
                nombre: user.nombre,
                motivo: motivoSel,
                asociadoMotivo: info ? info.asociado : "",
                detalle: document.getElementById('detalle').value
            })});
            
            const data = await res.json();
            if(data.status === 'success') {
                const el = document.getElementById('newId');
                el.innerText = data.id;
                el.dataset.copy = `${data.id}\t${data.fecha}`;
                document.getElementById('resCard').classList.remove('hidden');
                document.getElementById('detalle').value = "";
                cargarHistorial();
            }
            btn.disabled = false; loader.classList.add('hidden');
        }

        async function cargarHistorial() {
            const res = await fetch(API, {method:'POST', body: JSON.stringify({action:'getHistorialCompleto', nombre:user.nombre, token:TOKEN})});
            const data = await res.json();
            const table = document.getElementById('histTable');
            
            if(data.datos && data.datos.length > 0) {
                document.getElementById('noData').classList.add('hidden');
                table.innerHTML = data.datos.map(i => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-3 font-bold text-indigo-600">${i.id}</td>
                        <td class="p-3 text-slate-500">${new Date(i.fecha).toLocaleDateString()}</td>
                        <td class="p-3 font-medium">${i.motivo}</td>
                        <td class="p-3 text-slate-400 italic">${i.detalle || '-'}</td>
                        <td class="p-3 text-right font-bold text-slate-600">${i.cuenta || '-'}</td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('noData').classList.remove('hidden');
                table.innerHTML = "";
            }
        }

        function copiar() {
            navigator.clipboard.writeText(document.getElementById('newId').dataset.copy);
            alert("Copiado: ID y Fecha");
        }
    </script>
</body>
</html>
